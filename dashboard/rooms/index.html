<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cores - Casa dos Sonhos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/themes/nano.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/pickr.min.js"></script>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body class="bg-[#f9f7fe] min-h-screen flex" data-auth-required>
    <div id="auth-guard-loader">
        <div class="w-12 h-12 border-4 border-purple-200 border-t-purple-600 rounded-full animate-spin"></div>
    </div>
    
    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-white border-r border-purple-100 flex flex-col hidden md:flex">
        <div class="p-6 border-b border-purple-50 flex items-center space-x-3">
            <div class="w-8 h-8 rounded-full bg-purple-600 flex items-center justify-center">
                <i class="fas fa-heart text-white text-sm"></i>
            </div>
            <span class="font-bold text-purple-900 text-lg">Casa dos Sonhos</span>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="../index.html" class="flex items-center space-x-3 p-3 rounded-xl text-gray-500 hover:bg-purple-50 hover:text-purple-600 transition">
                <i class="fas fa-chart-line w-5"></i>
                <span>Visão Geral</span>
            </a>
            <a href="../items/index.html" class="flex items-center space-x-3 p-3 rounded-xl text-gray-500 hover:bg-purple-50 hover:text-purple-600 transition">
                <i class="fas fa-list w-5"></i>
                <span>Lista de Itens</span>
            </a>
            <a href="index.html" class="flex items-center space-x-3 p-3 rounded-xl bg-purple-50 text-purple-700 font-medium">
                <i class="fas fa-palette w-5"></i>
                <span>Cores e Cômodos</span>
            </a>
            <a href="../savings/index.html" class="flex items-center space-x-3 p-3 rounded-xl text-gray-500 hover:bg-purple-50 hover:text-purple-600 transition">
                <i class="fas fa-piggy-bank w-5"></i>
                <span>Cofrinho</span>
            </a>
            <a href="../profile/index.html" class="flex items-center space-x-3 p-3 rounded-xl text-gray-500 hover:bg-purple-50 hover:text-purple-600 transition">
                <i class="fas fa-user-circle w-5"></i>
                <span>Meu Perfil</span>
            </a>
            <button id="openShareModalBtn" class="w-full flex items-center space-x-3 p-3 rounded-xl text-gray-500 hover:bg-purple-50 hover:text-purple-600 transition">
                <i class="fas fa-users w-5"></i>
                <span>Compartilhar</span>
            </button>
        </nav>
        <div class="p-4 border-t border-purple-50">
            <div class="flex items-center space-x-3 mb-4 p-2">
                <div class="w-10 h-10 rounded-full bg-purple-200 flex items-center justify-center sidebar-user-photo overflow-hidden">
                    <i class="fas fa-user text-purple-600"></i>
                </div>
                <div class="flex flex-col overflow-hidden">
                    <span id="userName" class="text-xs font-bold text-purple-900 truncate">Carregando...</span>
                    <button id="logoutBtn" class="text-left text-[10px] text-red-500 hover:underline">Sair da conta</button>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <!-- Header Mobile -->
        <header class="md:hidden bg-white p-4 border-b border-purple-100 flex justify-between items-center shrink-0">
            <span class="font-bold text-purple-900">Casa dos Sonhos</span>
            <button id="mobileMenuBtn" class="text-purple-600 p-2"><i class="fas fa-bars text-xl"></i></button>
        </header>

        <div class="flex-1 overflow-y-auto">
            <div class="max-w-7xl mx-auto p-6 md:p-10 space-y-8">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h1 class="text-2xl font-bold text-purple-900">Ambientes & Estilos</h1>
                        <p class="text-gray-500">Defina a identidade visual de cada cantinho do seu novo lar.</p>
                    </div>
                    <button id="addRoomBtn" class="bg-purple-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-purple-200 hover:bg-purple-700 transition flex items-center justify-center space-x-2">
                        <i class="fas fa-plus"></i>
                        <span>Novo Cômodo</span>
                    </button>
                </div>

                <div id="roomsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    <!-- Cards will be injected here -->
                </div>

                <div id="emptyRoomsState" class="py-20 text-center hidden">
                    <div class="w-20 h-20 bg-purple-50 rounded-full flex items-center justify-center mx-auto mb-4 text-purple-200 text-3xl">
                        <i class="fas fa-palette"></i>
                    </div>
                    <h3 class="text-gray-500 font-medium text-lg">Nenhum cômodo definido</h3>
                    <p class="text-gray-400 text-sm mt-1">Comece criando os ambientes da sua nova casa.</p>
                    <button id="emptyAddRoomBtn" class="mt-6 text-purple-600 font-bold hover:underline">Adicionar meu primeiro cômodo</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Add Room -->
    <div id="addRoomModal" class="fixed inset-0 z-50 flex items-center justify-center bg-purple-900/20 backdrop-blur-sm modal modal-hidden px-4">
        <div class="bg-white rounded-[2rem] w-full max-w-md p-8 card-shadow custom-scrollbar">
            <h3 class="text-xl font-bold text-purple-900 mb-6" id="roomModalTitle">Novo Cômodo</h3>
            <form id="roomForm" class="space-y-6">
                <input type="hidden" id="editRoomId">
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase ml-1">Nome do Cômodo</label>
                    <input type="text" id="roomName" placeholder="Ex: Suíte Principal" class="w-full px-4 py-3 rounded-xl bg-purple-50 border-none outline-none focus:ring-2 focus:ring-purple-200" required>
                </div>
                
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase ml-1">Imagens de Referência (Moodboard - Máx 4)</label>
                    <div class="grid grid-cols-4 gap-2 mt-2">
                        <label class="room-image-slot">
                            <i class="fas fa-plus text-xs"></i>
                            <input type="file" class="hidden room-image-input" accept="image/*">
                        </label>
                        <label class="room-image-slot">
                            <i class="fas fa-plus text-xs"></i>
                            <input type="file" class="hidden room-image-input" accept="image/*">
                        </label>
                        <label class="room-image-slot">
                            <i class="fas fa-plus text-xs"></i>
                            <input type="file" class="hidden room-image-input" accept="image/*">
                        </label>
                        <label class="room-image-slot">
                            <i class="fas fa-plus text-xs"></i>
                            <input type="file" class="hidden room-image-input" accept="image/*">
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-4">
                        <div class="flex flex-col">
                            <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Principal</label>
                            <div class="flex items-center space-x-2 mt-1">
                                <div id="primaryColorPicker"></div>
                                <input type="text" id="primaryColorHex" class="w-full text-xs border-b border-purple-100 outline-none uppercase font-mono" value="#8B5CF6">
                            </div>
                        </div>
                        <div class="flex flex-col">
                            <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Destaque</label>
                            <div class="flex items-center space-x-2 mt-1">
                                <div id="accentColorPicker"></div>
                                <input type="text" id="accentColorHex" class="w-full text-xs border-b border-purple-100 outline-none uppercase font-mono" value="#FACC15">
                            </div>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div class="flex flex-col">
                            <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Secundária</label>
                            <div class="flex items-center space-x-2 mt-1">
                                <div id="secondaryColorPicker"></div>
                                <input type="text" id="secondaryColorHex" class="w-full text-xs border-b border-purple-100 outline-none uppercase font-mono" value="#2DD4BF">
                            </div>
                        </div>
                        <div class="flex flex-col">
                            <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Neutra</label>
                            <div class="flex items-center space-x-2 mt-1">
                                <div id="neutralColorPicker"></div>
                                <input type="text" id="neutralColorHex" class="w-full text-xs border-b border-purple-100 outline-none uppercase font-mono" value="#FFFFFF">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex space-x-3 pt-4">
                    <button type="button" id="cancelRoomBtn" class="flex-1 py-3 text-gray-400 font-bold text-sm hover:bg-gray-50 rounded-2xl transition">Cancelar</button>
                    <button type="submit" class="flex-1 py-3 bg-purple-600 text-white rounded-2xl font-bold text-sm shadow-lg shadow-purple-200 hover:bg-purple-700 transition">Salvar Cômodo</button>
                </div>
            </form>
        </div>
    </div>

    <div class="sidebar-overlay"></div>
    <script type="module" src="../../assets/js/app.js"></script>
</body>
</html>
