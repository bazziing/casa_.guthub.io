<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Casa dos Sonhos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-6 gradient-bg">
    <div class="max-w-md w-full bg-white rounded-2xl p-8 card-shadow">
        <a href="../../index.html" class="text-purple-600 text-sm font-medium mb-6 inline-flex items-center hover:text-purple-800 transition">
            <i class="fas fa-arrow-left mr-2"></i> Início
        </a>
        <h2 class="text-2xl font-bold text-purple-900 mb-6">Acesse sua conta</h2>
        <form id="loginForm" class="space-y-4">
            <div>
                <label for="loginEmail" class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                <input type="email" id="loginEmail" class="w-full px-4 py-2 border border-purple-100 rounded-lg outline-none focus:border-purple-300" placeholder="seu@email.com" required>
            </div>
            <div>
                <label for="loginPassword" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                <input type="password" id="loginPassword" class="w-full px-4 py-2 border border-purple-100 rounded-lg outline-none focus:border-purple-300" placeholder="••••••••" required>
                <div class="text-right mt-1">
                    <button type="button" id="forgotPasswordBtn" class="text-xs text-purple-600 hover:underline">Esqueceu a senha?</button>
                </div>
            </div>
            <button type="submit" class="w-full py-3 bg-purple-600 text-white rounded-xl font-semibold hover:bg-purple-700 transition mt-4">
                Entrar
            </button>
        </form>
        <p class="mt-6 text-center text-sm text-gray-500">
            Não tem uma conta? <a href="../signup/index.html" class="text-purple-600 font-semibold hover:underline">Cadastre-se</a>
        </p>
    </div>
    <div id="messageModal" class="fixed inset-0 z-[200] flex items-center justify-center bg-purple-900/20 backdrop-blur-sm modal modal-hidden px-4">
        <div class="bg-white rounded-[2rem] w-full max-w-sm p-8 card-shadow text-center">
            <div id="messageIconContainer" class="w-16 h-16 rounded-2xl bg-purple-50 flex items-center justify-center mx-auto mb-6">
                <i id="messageIcon" class="fas fa-info-circle text-purple-600 text-2xl"></i>
            </div>
            <h3 id="messageTitle" class="text-xl font-bold text-purple-900 mb-2">Aviso</h3>
            <p id="messageContent" class="text-gray-500 mb-8 leading-relaxed">Mensagem aqui...</p>
            <div id="messageActions" class="flex space-x-3">
                <button id="messageCancelBtn" class="hidden flex-1 py-3 text-gray-400 font-bold text-sm hover:bg-gray-50 rounded-2xl transition">Cancelar</button>
                <button id="messageConfirmBtn" class="flex-1 py-3 bg-purple-600 text-white rounded-2xl font-bold text-sm shadow-lg shadow-purple-200 hover:bg-purple-700 transition">Entendi</button>
            </div>
        </div>
    </div>
    <script type="module" src="../../assets/js/auth-login.js"></script>
</body>
</html>
