<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saindo... - Casa dos Sonhos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-6 gradient-bg">
    <div class="max-w-md w-full bg-white rounded-[2.5rem] p-10 card-shadow text-center">
        <div class="w-20 h-20 rounded-3xl bg-purple-100 flex items-center justify-center mx-auto mb-8 animate-pulse">
            <i class="fas fa-sign-out-alt text-purple-600 text-4xl"></i>
        </div>
        
        <h1 class="text-2xl font-bold text-purple-900 mb-2">Saindo da sua conta</h1>
        <p class="text-gray-500 mb-8">Salvando suas últimas alterações com segurança na nuvem...</p>
        
        <div class="flex justify-center">
            <div class="w-12 h-12 border-4 border-purple-200 border-t-purple-600 rounded-full animate-spin"></div>
        </div>
    </div>

    <script type="module">
        import { cloudService } from '../../assets/js/classes/CloudService.js';
        
        async function performLogout() {
            try {
                // Tenta realizar o logout no Firebase
                await cloudService.logout();
                console.log("Logout realizado com sucesso.");
            } catch (error) {
                console.error("Erro ao realizar logout:", error);
            } finally {
                // SEMPRE redireciona para a home após 1.2s, mesmo se der erro
                setTimeout(() => {
                    window.location.href = '../../index.html';
                }, 1200);
            }
        }

        // Iniciar processo assim que carregar
        performLogout();
    </script>
</body>
</html>
