<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Casa dos Sonhos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-6 gradient-bg">
    <div class="max-w-md w-full bg-white rounded-2xl p-8 card-shadow">
        <a href="../../index.html" class="text-purple-600 text-sm font-medium mb-6 inline-flex items-center hover:text-purple-800 transition">
            <i class="fas fa-arrow-left mr-2"></i> Início
        </a>
        <h2 class="text-2xl font-bold text-purple-900 mb-6">Crie sua conta</h2>
        <form id="signupForm" class="space-y-4">
            <div>
                <label for="signupEmail" class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                <input type="email" id="signupEmail" class="w-full px-4 py-2 border border-purple-100 rounded-lg outline-none focus:border-purple-300" placeholder="seu@email.com" required>
            </div>
            <div>
                <label for="signupPassword" class="block text-sm font-medium text-gray-700 mb-1">Senha (mín. 6 caracteres)</label>
                <input type="password" id="signupPassword" class="w-full px-4 py-2 border border-purple-100 rounded-lg outline-none focus:border-purple-300" placeholder="••••••••" required minlength="6">
            </div>
            <button type="submit" class="w-full py-3 bg-purple-600 text-white rounded-xl font-semibold hover:bg-purple-700 transition mt-4">
                Criar Conta Grátis
            </button>
        </form>
        <p class="mt-6 text-center text-sm text-gray-500">
            Já tem uma conta? <a href="../login/index.html" class="text-purple-600 font-semibold hover:underline">Faça Login</a>
        </p>
    </div>
    <script type="module" src="../../assets/js/auth-signup.js"></script>
</body>
</html>
