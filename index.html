<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa dos Sonhos | Planejamento para Casais</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="min-h-screen bg-[#f9f7fe]">
    <!-- Landing Screen -->
    <section class="min-h-screen flex flex-col items-center justify-center p-6 gradient-bg text-center">
        <div class="max-w-md w-full bg-white rounded-[2.5rem] p-10 card-shadow">
            <div class="w-20 h-20 rounded-3xl bg-purple-600 flex items-center justify-center shadow-xl shadow-purple-200 mx-auto mb-8 rotate-3">
                <i class="fas fa-heart text-white text-4xl"></i>
            </div>
            
            <h1 class="text-3xl font-black text-purple-900 mb-2 tracking-tight">Casa dos Sonhos</h1>
            <p class="text-gray-500 mb-10 leading-relaxed">Organize cada detalhe do seu novo lar em tempo real com quem você ama.</p>
            
            <div class="space-y-4">
                <a href="auth/login/index.html" class="block w-full py-4 bg-purple-600 text-white rounded-2xl font-bold hover:bg-purple-700 transition shadow-lg shadow-purple-200">
                    Entrar na Minha Conta
                </a>
                <a href="auth/signup/index.html" class="block w-full py-4 bg-white border-2 border-purple-50 text-purple-900 rounded-2xl font-bold hover:bg-purple-50 transition">
                    Criar Nova Conta
                </a>
            </div>
            
            <div class="mt-10 flex items-center justify-center space-x-4">
                <div class="flex -space-x-2">
                    <div class="w-8 h-8 rounded-full border-2 border-white bg-purple-100"></div>
                    <div class="w-8 h-8 rounded-full border-2 border-white bg-green-100"></div>
                </div>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Sincronizado na nuvem</p>
            </div>
        </div>
    </section>
    <script type="module" src="assets/js/landing.js"></script>
</body>
</html>
